<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2>{{ isEditMode ? 'Sửa danh mục' : 'Thêm danh mục mới' }}</h2>

      <!-- Loading -->
      <div *ngIf="loading" class="text-center my-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Đang tải...</span>
        </div>
      </div>

      <!-- Form -->
      <form *ngIf="!loading" [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="mt-4">
        <!-- Name -->
        <div class="mb-3">
          <label for="name" class="form-label">Tên danh mục <span class="text-danger">*</span></label>
          <input
            type="text"
            id="name"
            class="form-control"
            formControlName="name"
            [class.is-invalid]="f['name'].invalid && f['name'].touched">
          <div class="invalid-feedback" *ngIf="f['name'].invalid && f['name'].touched">
            <div *ngIf="f['name'].errors?.['required']">Tên danh mục là bắt buộc</div>
            <div *ngIf="f['name'].errors?.['maxlength']">Tên danh mục tối đa 100 ký tự</div>
          </div>
        </div>

        <!-- Description -->
        <div class="mb-3">
          <label for="description" class="form-label">Mô tả</label>
          <textarea
            id="description"
            class="form-control"
            rows="3"
            formControlName="description"></textarea>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-2">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="submitting || categoryForm.invalid">
            <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
            {{ isEditMode ? 'Cập nhật' : 'Tạo mới' }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="submitting">
            Hủy
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

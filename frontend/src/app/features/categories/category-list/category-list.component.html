<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Danh sách danh mục</h2>
    <a routerLink="/categories/create" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Thêm danh mục
    </a>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center my-4">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Đang tải...</span>
    </div>
  </div>

  <!-- Table -->
  <div *ngIf="!loading && categories.length > 0" class="table-responsive">
    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th>Tên danh mục</th>
          <th>Mô tả</th>
          <th>Ngày tạo</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let category of categories">
          <td>{{ category.name }}</td>
          <td>{{ category.description || '-' }}</td>
          <td>{{ category.createdAt | date:'dd/MM/yyyy' }}</td>
          <td>
            <a [routerLink]="['/categories/edit', category.id]" class="btn btn-sm btn-warning me-1">Sửa</a>
            <button (click)="onDelete(category.id, category.name)" class="btn btn-sm btn-danger">Xóa</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- No data -->
  <div *ngIf="!loading && categories.length === 0" class="alert alert-info">
    Không có danh mục nào
  </div>

  <!-- Pagination -->
  <nav *ngIf="pagedResult && pagedResult.totalPages > 1" aria-label="Page navigation">
    <ul class="pagination justify-content-center">
      <li class="page-item" [class.disabled]="!pagedResult.hasPrevious">
        <button class="page-link" (click)="onPageChange(currentPage - 1)" [disabled]="!pagedResult.hasPrevious">
          Trước
        </button>
      </li>
      <li class="page-item active">
        <span class="page-link">
          Trang {{ pagedResult.page }} / {{ pagedResult.totalPages }}
        </span>
      </li>
      <li class="page-item" [class.disabled]="!pagedResult.hasNext">
        <button class="page-link" (click)="onPageChange(currentPage + 1)" [disabled]="!pagedResult.hasNext">
          Sau
        </button>
      </li>
    </ul>
  </nav>
</div>
